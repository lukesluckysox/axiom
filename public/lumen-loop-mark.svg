<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Background circle (transparent for favicon, dark bg for PWA) -->

  <!-- ═══ OUTER LOOP RING ═══════════════════════════════════════════
       Half-solid, half-dashed circle — the open-circuit loop glyph
       that replaced the chain pills. This orbits around the Lumen center. -->

  <!-- Solid half (bottom-left arc: clockwise from ~210° to ~30°) -->
  <path d="M256 36
    C377.4 36 476 134.6 476 256
    S377.4 476 256 476"
    stroke="#FFD166" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.65"/>

  <!-- Dashed half (top-right arc: clockwise from ~30° to ~210°) -->
  <path d="M256 476
    C134.6 476 36 377.4 36 256
    S134.6 36 256 36"
    stroke="#FFD166" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 10" fill="none" opacity="0.3"/>

  <!-- Loop node marker (top-center, 12 o'clock position) -->
  <circle cx="256" cy="36" r="10" fill="#FFD166" opacity="0.85"/>

  <!-- ═══ INNER LUMEN MARK ═══════════════════════════════════════════
       The radial sun/compass — Lumen's identity glyph -->

  <!-- Diffusion rings -->
  <circle cx="256" cy="256" r="140" stroke="#EDF2F4" stroke-width="1" opacity="0.08"/>
  <circle cx="256" cy="256" r="100" stroke="#EDF2F4" stroke-width="1" opacity="0.06"/>
  <circle cx="256" cy="256" r="60"  stroke="#FFD166" stroke-width="1.5" opacity="0.18"/>

  <!-- Cardinal rays -->
  <line x1="256" y1="86"  x2="256" y2="176" stroke="#FFD166" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
  <line x1="426" y1="256" x2="336" y2="256" stroke="#EDF2F4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="256" y1="426" x2="256" y2="336" stroke="#EDF2F4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="86"  y1="256" x2="176" y2="256" stroke="#EDF2F4" stroke-width="2.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Diagonal rays -->
  <line x1="136" y1="136" x2="189" y2="189" stroke="#EDF2F4" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="376" y1="136" x2="323" y2="189" stroke="#EDF2F4" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="136" y1="376" x2="189" y2="323" stroke="#EDF2F4" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="376" y1="376" x2="323" y2="323" stroke="#EDF2F4" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>

  <!-- Centre glow -->
  <circle cx="256" cy="256" r="34" fill="#FFD166" opacity="0.45"/>
  <circle cx="256" cy="256" r="22" fill="#FFD166" opacity="0.7"/>
  <circle cx="256" cy="256" r="12" fill="#FFD166"/>
</svg>
